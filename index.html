<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>CC Tracker</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:system-ui,sans-serif;background:#0E1117;color:#F2F0EC;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:24px;padding:20px}.title{font-size:22px;font-weight:700;letter-spacing:-.01em}.subtitle{font-size:13px;color:#5C6780;text-align:center;line-height:1.5;max-width:260px}.countdown-wrap{position:relative;width:72px;height:72px}.countdown-wrap svg{position:absolute;top:0;left:0;transform:rotate(-90deg)}.countdown-wrap circle{fill:none;stroke:#1E2535;stroke-width:4}.countdown-wrap .progress{stroke:#4A8FE8;stroke-width:4;stroke-linecap:round;stroke-dasharray:188.5;stroke-dashoffset:0;transition:stroke-dashoffset 1s linear}.countdown-num{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:26px;font-weight:800;color:#4A8FE8}.skip{font-size:12.5px;color:#4A8FE8;text-decoration:none;font-weight:600;margin-top:4px}</style></head><body><div class="title">Card Routing</div><div class="countdown-wrap"><svg viewBox="0 0 64 64" width="72" height="72"><circle cx="32" cy="32" r="30"/><circle class="progress" id="ring" cx="32" cy="32" r="30"/></svg><div class="countdown-num" id="num">5</div></div><div class="subtitle">Opening Plan B routing guide…</div><a class="skip" href="plan-b-routing.html">Open now →</a><script>var t=5,circ=188.5,ring=document.getElementById("ring"),num=document.getElementById("num");function tick(){ring.style.strokeDashoffset=(circ*(1-t/5));num.textContent=t;if(t<=0){window.location.href="plan-b-routing.html";}t--;}tick();setInterval(tick,1000);</script></body></html>
